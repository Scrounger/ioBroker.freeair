# Dependabot will run on day 14 of each month at 03:10 (Europe/Berlin timezone)
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '10 3 14 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Scrounger'
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '10 3 14 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'Scrounger'
